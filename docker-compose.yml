version: "3.8"

services:
  app:
    build: .
    image: eid88805/lab6-app:v1
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/tasksdb
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
